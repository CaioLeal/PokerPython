<!DOCTYPE html>
<html lang="pt-BR">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Pokerpython</title>
    <link rel="stylesheet" href="/src/style.css">
  </head>
  <body>
    <div class="mesa-de-poker">
      
      <div class="area-adversario">
        <h2>Adversário (Bot) <span class="ficha-dealer" id="dealer-bot" style="display: none;">D</span></h2>
        <div class="cartas-adversario" id="cartas-bot">
          </div>
      </div>

      <div class="area-comum">
        <h3>Pote: $<span id="valor-pote">0</span></h3>
        <div id="fichas-pote" class="montanha-fichas"></div>
        
        <div class="cartas-comunitarias" id="cartas-mesa">
          </div>
      </div>

      <div class="area-jogador">
        <div class="cartas-jogador" id="minhas-cartas">
          </div>
          <h2>Caio <span class="ficha-dealer" id="dealer-jogador" style="display: none;">D</span></h2>
        <p>Fichas: $<span id="minhas-fichas">1000</span></p>
        
        <div class="controles">
          <button id="btn-correr">Correr (Fold)</button>
          <button id="btn-pagar">Pagar (Call)</button>
          <input type="number" id="input-aposta" min="10" step="10" value="50">
          <button id="btn-apostar">Apostar (Raise)</button>

          <button id="btn-nova-rodada" style="display: none; background-color: #8b5cf6;">Nova Mão</button>
        </div>
      </div>

    </div>

    <script src="https://cdnjs.cloudflare.com/ajax/libs/gsap/3.12.2/gsap.min.js"></script>
    <script type="module" src="/src/main.js"></script>
  </body>
</html>
